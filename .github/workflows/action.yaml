name: registration-page
on:
  push:
    branches:
      - main
      - dev
      - master
    paths-ignore: 
      - frontend/*
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch: 
jobs:
  java-installation:
    runs-on: self-hosted
    steps:      
      - name: Set up Maven and Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin
      - run: java --version
      - run: mvn --version
  compiling-and-buildig:
    runs-on: self-hosted
    needs: java-installation
    steps:   
      - name: git checkout
        uses: actions/checkout@v7
      - name: changing-directory
        working-directory: ./backend
        run: mvn clean package
  running-project:
    runs-on: self-hosted
    needs: compiling-and-buildig
    steps:
      - name: runningg
        run: java -jar ./target/*.jar
