name: registration-page
on:
  push:
    branches:
      - main
      - dev
      - master
    paths-ignore: 
      - frontend/*
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch: 
jobs:
  java-installation:
    runs-on: self-hosted
    strategy:
      matrix:
        java: [ '17', '21', '25' ]
    name: Java ${{ matrix.Java }} sample
    steps:
      - uses: actions/checkout@v6
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: '<distribution>'
          java-version: ${{ matrix.java }}
      - run: java --version
  git-checkout:
    runs-on: self-hosted
    needs: java-installation
    strategy:
      matrix:
        maven: [ '3.8.8', '3.9.8' ]
    name: Maven ${{ matrix.maven }} sample
    steps:
      - name: cloning-repo
        uses: actions/checkout@v7
      - name: maven installation
        uses: s4u/setup-maven-action@< version >
        with:
          java-version: 17
          maven-version: ${{ matrix.maven }}
      - name: changing-directory
        working-directory: ./backend
        run: mvn clean package
  running-project:
    runs-on: self-hosted
    needs: git-checkout
    steps:
      - name: runningg
        run: java -jar ./target/*.jar
